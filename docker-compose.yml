# 后端 Docker Compose 一键部署所有服务
services:
  # 后端 PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine  # 后端 alpine 精简版，110MB
    container_name: agentforge-postgres
    environment:
      - POSTGRES_DB=agentforge
      - POSTGRES_USER=agentforge
      - POSTGRES_PASSWORD=agentforge123
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data  # 后端 数据持久化
    restart: unless-stopped

  # 后端 AgentForge API 服务
  app:
    build: .  # 后端 从当前目录 Dockerfile 构建
    container_name: agentforge-app
    ports:
      - "7860:7860"
    environment:
      - PG_HOST=postgres  # 后端 Docker 内用容器名通信，覆盖 .env 的 localhost
    env_file:
      - .env  # 后端 其他配置从 .env 读取
    depends_on:
      - postgres  # 后端 等 PG 起来再启动
    restart: unless-stopped

volumes:
  postgres:
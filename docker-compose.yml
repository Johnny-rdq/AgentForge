# 后端 Docker Compose 编排
version: "3.8"

services:
  agentforge:
    build: .
    container_name: agentforge
    ports:
      - "7860:7860"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-agnes-2.0-flash}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://apihub.agnes-ai.com/v1}
      - LLM_PROVIDER=${LLM_PROVIDER:-agnes}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # 后端 容器环境默认关闭人工审批（无前端交互）
      - HITL_ENABLED=${HITL_ENABLED:-false}
      - REFLECTION_ENABLED=${REFLECTION_ENABLED:-true}
    volumes:
      - ./data:/app/data   # 后端 数据库 + 报告持久化
      - ./logs:/app/logs   # 后端 日志持久化
    restart: unless-stopped
